<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>AR - Modelo 3D Animado</title>
  <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  <style>
    body { margin: 0; overflow: hidden; }
    .a-enter-vr { display: none; }
  </style>
</head>
<body style="margin:0;overflow:hidden">

  <a-scene embedded arjs="sourceType: webcam; sourceWidth: 1280; sourceHeight: 960; displayWidth: 1280; displayHeight: 960; debugUIEnabled: false;" vr-mode-ui="enabled: false">

    <a-assets>
      <a-asset-item id="modelo3d" src="model.glb"></a-asset-item>
    </a-assets>

    <a-marker preset="hiro" id="marcador">
      <a-entity
        id="objeto"
        gltf-model="#modelo3d"
        scale="1 1 1"
        position="0 0 0"
        rotation="0 0 0">
      </a-entity>
    </a-marker>

    <a-entity camera></a-entity>
  </a-scene>

  <script>
    // Animação procedural: gira e flutua o objeto continuamente,
    // já que o .glb não tem animação embutida (sem armature/keyframes).
    AFRAME.registerComponent('animar-objeto', {
      tick: function (time) {
        const t = time / 1000;
        this.el.setAttribute('rotation', {
          x: 0,
          y: (t * 40) % 360,   // gira 40 graus por segundo no eixo Y
          z: 0
        });
        const flutuar = Math.sin(t * 2) * 0.1; // sobe/desce suavemente
        this.el.setAttribute('position', { x: 0, y: flutuar, z: 0 });
      }
    });

    document.addEventListener('DOMContentLoaded', () => {
      const obj = document.querySelector('#objeto');
      obj.setAttribute('animar-objeto', '');
    });
  </script>

  <script>
    // Correção de zoom em celulares com múltiplas lentes traseiras (comum em Samsung):
    function corrigirZoomCamera() {
      const video = document.querySelector('#arjs-video') || document.querySelector('video');
      if (!video || !video.srcObject) {
        setTimeout(corrigirZoomCamera, 500);
        return;
      }
      const track = video.srcObject.getVideoTracks()[0];
      if (!track) return;
      const capabilities = track.getCapabilities ? track.getCapabilities() : {};
      if (capabilities.zoom) {
        track.applyConstraints({ advanced: [{ zoom: capabilities.zoom.min }] })
          .catch(err => console.warn('Não foi possível ajustar zoom:', err));
      }
    }
    window.addEventListener('load', () => setTimeout(corrigirZoomCamera, 1000));
  </script>

</body>
</html>
